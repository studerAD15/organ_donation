<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">LifeGive — Organ Donation Logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo for LifeGive, an organ donation website, featuring a heart with outstretched hands and a pulse line</desc>

  <defs>
    <clipPath id="heartClip">
      <path d="M340 230 C260 175, 210 145, 210 105 C210 75, 235 55, 265 55 C290 55, 310 68, 340 95 C370 68, 390 55, 415 55 C445 55, 470 75, 470 105 C470 145, 420 175, 340 230Z"/>
    </clipPath>
  <mask id="imagine-text-gaps-et8jjp" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="340" fill="white"/><rect x="254.54751586914062" y="248.7555389404297" width="170.90493774414062" height="44.80000305175781" fill="black" rx="2"/><rect x="241.94509887695312" y="293.9111022949219" width="196.10972595214844" height="19.111111640930176" fill="black" rx="2"/></mask></defs>

