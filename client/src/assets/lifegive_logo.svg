  <polyline points="240,135 265,135 278,108 290,158 303,95 316,158 329,135 355,135 365,118 374,150 385,135 410,135" fill="none" stroke="#A32D2D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#heartClip)" style="fill:none;stroke:rgb(163, 45, 45);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

