  <path d="M233 235 Q340 265, 447 235" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7" mask="url(#imagine-text-gaps-et8jjp)" style="fill:none;stroke:rgb(29, 158, 117);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

