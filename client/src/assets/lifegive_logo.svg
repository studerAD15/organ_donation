  <path d="M340 228 C260 173, 208 142, 208 103 C208 72, 234 52, 265 52 C291 52, 312 66, 340 94 C368 66, 389 52, 415 52 C446 52, 472 72, 472 103 C472 142, 420 173, 340 228Z" fill="#F7C1C1" stroke="#E24B4A" stroke-width="1.5" style="fill:rgb(247, 193, 193);stroke:rgb(226, 75, 74);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

